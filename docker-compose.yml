services:
  minio:
    image: minio/minio:RELEASE.2026-01-18T22-43-38Z
    command: server /data --console-address ":9001"
    env_file:
      - .env.example
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:RELEASE.2026-01-17T23-09-52Z
    depends_on:
      - minio
    env_file:
      - .env.example
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done &&
      /usr/bin/mc mb --ignore-existing local/$${MINIO_BUCKET}
      '

  web:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - .env.example
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      - minio
    volumes:
      - ./app:/app
      - ./data/raw_spool:/app/data/raw_spool

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    env_file:
      - .env.example
    depends_on:
      - minio
      - web
    working_dir: /workspace
    volumes:
      - .:/workspace

volumes:
  minio-data:
